<div class="container loginSection" style="width: 25rem;">
  <div class="card shadow-5-strong">
    <div style="padding: 1rem; text-align: center;">      
      <img width="250rem" src="{{ url_for('static', filename= 'img/logo.png') }}">
    </div>
    
    <div class="card-body">
      <h3 class="card-title"><a>Inicio de sesión</a></h3><br/>
      <form>
        <!-- Usuario input-->
        <div class="form-outline mb-4">
          <input class="form-control" id="username" type="text" name="username"/>
          <label class="form-label" for="username">Usuario</label>
        </div>
        <!-- Password input-->
        <div class="form-outline mb-4">
          <input class="form-control" id="password" type="password" name="password"/>
          <label class="form-label" for="password">Contrase&ntilde;a</label>
        </div><br/>
        <button onclick="login()" style="width: 10rem; margin: 0 auto; background-color: #4A001F; color: white; " class="btn btn-primary btn-block" type="button">Iniciar sesión</button>
      </form>
    </div>
  </div>

<script type="text/javascript" src="{{ url_for('static', filename= 'js/mdb.min.js') }}"></script>
<script type="text/javascript" src="{{ url_for('static', filename= 'js/jquery-3.6.0.min.js') }}"></script>
<script type="text/javascript">
   function login() {
    // Backend logic
    var formData = new FormData();

    // Appending data
    formData.append('username', $('#username').val());
    formData.append('password', $('#password').val());
    

    $.ajax({
       url: '/login',
       type: 'post',
       data: formData,
       async: false,
       contentType: false,
       processData: false,
       success: function(response) {          
          window.location.replace('/scans');
       }, // success: function
       error: function(response) {
          window.location.replace('/login');
          console.log('Error');
       }
    });    
    window.location.replace('/login');
  } // addT
</script>
